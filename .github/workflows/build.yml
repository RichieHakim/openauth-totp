name: build

on:
  push:
    branches: [ "main" ]  
  workflow_dispatch:
    inputs:
      name:
        description: 'description'     
        required: false                     
        default: '' 
        
permissions:
  contents: read

jobs:

  build:

    name: ${{ matrix.platform }}, py${{ matrix.python-version }}, ${{ matrix.install-level }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [
          ubuntu-latest,
          ubuntu-24.04,
          ubuntu-22.04,
          # ubuntu-20.04,
          windows-latest,
          windows-2022,
          # windows-2019,
          macos-latest,
          macos-14,
          # macos-11.0,  ## eva-decord fails on macos-11
          # macos-10.15,
        ]
        python-version: [ 
          # "3.9",
          "3.10",
          "3.11",
          "3.12",
          "3.13",
        ]
        install-level: [
          system,
        ]

    steps:
    
    - name: Set up conda
      uses: conda-incubator/setup-miniconda@v2
      with:
        miniconda-version: latest
        activate-environment: openauth-totp
        auto-activate-base: true
        auto-update-conda: false
        remove-profiles: true
        architecture: x64
        clean-patched-environment-file: true
        run-post: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Check out repository code
      uses: actions/checkout@v4
        
    - name: Prepare PowerShell
      shell: pwsh
      run: |
          conda info
          conda list

    - name: Check specs of the machine -- Linux
      if: startsWith(matrix.platform, 'ubuntu')
      run: |
        ## check cpu, memory, disk, etc.
        ## print the command inputs to the workflow
        echo "CPU info (lscpu):"
        lscpu
        echo "Memory info (free -h):"
        free -h
        echo "Disk info (df -h):"
        df -h
        echo "Network info (ip a):"
        ip a
        echo "OS info (uname -a):"
        uname -a
    - name: Check specs of the machine -- Windows
      if: startsWith(matrix.platform, 'windows')
      run: |
        ## check cpu, memory, disk, etc.
        ## just do a generic check on system info
        ## print the command inputs to the workflow
        echo "System info (systeminfo):"
        systeminfo
    - name: Check specs of the machine -- MacOS
      if: startsWith(matrix.platform, 'macos')
      run: |
        ## check cpu, memory, disk, etc.
        ## print the command inputs to the workflow
        echo "CPU info (sysctl -n machdep.cpu.brand_string):"
        sysctl -n machdep.cpu.brand_string
        echo "Memory info (sysctl -n hw.memsize):"
        sysctl -n hw.memsize
        echo "Disk info (df -h):"
        df -h
        echo "OS info (uname -a):"
        uname -a
    

    - name: Install package with pip dependencies -- system-level
      if: matrix.install-level == 'system'
      run: |
        ## install dependencies with optional extras
        pip install -v -e .